<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הרשימות שלי - WorldExplorer</title>

    <!-- חיבור לעיצוב הראשי -->
    <link rel="stylesheet" href="../css/StyleSheet.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- ספריות המפה -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsvectormap/dist/css/jsvectormap.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/jsvectormap"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsvectormap/dist/maps/world.js"></script>
</head>
<body>

    <header>
        <div class="logo">
            <i class="fas fa-globe-americas"></i> WorldExplorer
        </div>
        <nav>
            <ul>
                <li><a href="../index.html">חזרה לדף הבית</a></li>
                <li><a href="my-lists.html">הרשימות שלי</a></li>
                <li><a href="quizzes.html">חידונים</a></li>

                <!-- הקישור למנהל -->
                <li id="adminLinkLi" style="display: none;">
                    <a href="admin.html" style="color: #f59e0b; font-weight: bold;"><i class="fas fa-crown"></i> פאנל מנהל</a>
                </li>

                <li id="userGreetingLi" style="display: none;"><span id="userGreeting" style="font-weight: bold; color: #fff; margin: 0 15px;"></span></li>
                <li id="logoutLi" style="display: none;"><a href="#" id="btnLogout">התנתקות</a></li>
            </ul>
        </nav>
    </header>

    <main class="lists-layout fade-in-up">

        <div class="map-wrapper">
            <h2 style="margin-top: 0; color: white;"><i class="fas fa-map"></i> מפת המסעות שלי</h2>
            <p style="color: #94a3b8; font-size: 0.9rem; margin-top: -10px;">לחץ על מדינה במפה כדי להחליף סטטוס (ביקרתי -> יעד -> הסרה), או סמן ברשימות בצד.</p>
            <div id="world-map"></div>
        </div>

        <div class="checklists-wrapper">

            <input type="text" id="mapSearch" class="form-control" placeholder="🔍 חפש מדינה ברשימה..." style="margin-bottom: 15px; width: 100%; box-sizing: border-box; background: rgba(15,23,42,0.95);">

            <div class="checklist-box">
                <h3><i class="fas fa-check-circle" style="color: #2ecc71;"></i> כבר ביקרתי</h3>
                <div class="list-items-container" id="visited-list"></div>
            </div>

            <div class="checklist-box">
                <h3><i class="fas fa-plane" style="color: #f39c12;"></i> היעד הבא שלי</h3>
                <div class="list-items-container" id="want-list"></div>
            </div>

            <div class="checklist-box">
                <h3><i class="fas fa-heart" style="color: #ef4444;"></i> מועדפים</h3>
                <div class="list-items-container" id="favorite-list"></div>
            </div>

        </div>

    </main>

    <!-- חיבור לקובץ ה-AJAX הגלובלי שלנו שיושב בתיקיית JS -->
    <script src="../JS/AjaxCall.js"></script>
</body>
</html>
